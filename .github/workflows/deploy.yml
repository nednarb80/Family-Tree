name: Deploy Family Tree to GitHub Pages

# Publishes the Quartz site whenever you push to main.
# One-time setup: repo Settings → Pages → Source → "GitHub Actions".
# See docs/PUBLISHING.md for the full walkthrough.

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a rebuild manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Quartz uses git history for page dates

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Quartz lives in a subfolder of the repo (set up per docs/PUBLISHING.md).
      # Adjust 'working-directory' if you place it elsewhere.
      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build site
        working-directory: quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
